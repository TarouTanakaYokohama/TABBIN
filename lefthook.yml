pre-commit:
  commands:
    check_write:
      glob: "*.{js,ts,cjs,mjs,d.cts,d.mts,jsx,tsx,json,jsonc}"
      run: npx @biomejs/biome check --write --no-errors-on-unmatched --files-ignore-unknown=true --colors=off .
      stage_fixed: true
    compile:
      run: bun run compile
    check:
      run: bun run check
    build:
      run: CI=1 bun run build --level warn
    test:
      run: bun run test

pre-push:
  commands:
    check:
      run: bun run check
    compile:
      run: bun run compile
    build:
      run: CI=1 bun run build --level warn
    test:
      run: bun run test
    check_unused:
      run: bun run knip
    check_duplication:
      run: bun run check:duplication
